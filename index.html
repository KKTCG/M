/* ── Popup ── */

        box-shadow:0 4px 20px #0002;padding:14px 16px;min-width:220px}

#ocPop .oc-actions button{flex:1;padding:6px;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600}
.oc-save-btn{background:#1a3a5c;color:#fff}.oc-save-btn:hover{background:#2d6a9f}
.oc-cancel-btn{background:#f0f0f0;color:#555}.oc-cancel-btn:hover{background:#ddd}
.oc-clear-btn{background:#fff0f0;color:#c0392b;font-size:.72rem}.oc-clear-btn:hover{background:#ffd5d0}
#loading{padding:40px;text-align:center;font-size:1rem;color:#555}
</style>

<script>
/* ── Constants ── */
const DATA_URL = 'https://raw.githubusercontent.com/kktcg/M/main/ihale_data.json';
const CACHE_KEY = 'mik_ihale_v2';
const OC_KEY = 'mik_oc';
let DATA = [];
let OC = {};
let sc = 'kalan', sd = 1, cp = 1;
const PS = 25;

/* ── Date helpers ── */
function pd(s){if(!s)return 0;s=s.trim().split(' ')[0];const p=s.split('/');if(p.length===3)return new Date(+p[2],+p[1]-1,+p[0]).getTime();return new Date(s).getTime()||0;}
function kg(k){const ts=pd(k);if(!ts)return null;return Math.ceil((ts-new Date().setHours(0,0,0,0))/86400000);}
function bn(b){return parseFloat((b||'').replace(/[^0-9.]/g,''))||0;}

/* ── Drive sync ── */
let _driveTimer = null;
function saveOCToFile(){
  try{localStorage.setItem(OC_KEY,JSON.stringify(OC));}catch(e){}
  if(_driveTimer) clearTimeout(_driveTimer);
  document.getElementById('ocStatus').textContent = '✓ Saved — Drive sync in 10s…';
  _driveTimer = setTimeout(async ()=>{
    try{
      const now = new Date();
      const ts = now.getFullYear().toString()
        + String(now.getMonth()+1).padStart(2,'0')
        + String(now.getDate()).padStart(2,'0')
        + '_'
        + String(now.getHours()).padStart(2,'0')
        + String(now.getMinutes()).padStart(2,'0');
      const fname = 'on_calisma_' + ts + '.json';
      await window.cowork.callMcpTool(
        'mcp__700ce335-af06-483e-95ed-d95caf3ce820__create_file',
        {
          title: fname,
          textContent: JSON.stringify(OC, null, 2),
          contentMimeType: 'text/plain',
          disableConversionToGoogleType: true,
          parentId: '1yvEXzmGEPuTRp9VHzi5MckWdS5ToUrQz'
        }
      );
      document.getElementById('ocStatus').textContent = '✓ Drive: ' + fname;
    }catch(e){
      document.getElementById('ocStatus').textContent = '⚠ Drive: ' + e.message;
    }
    _driveTimer = null;
  }, 10000);
}

/* ── Popup ── */
let ocCurrentNo = null;
function ocOpen(no, evt){
  ocCurrentNo = no;
  const d = OC[no] || {};
  document.getElementById('ocIhaleNo').textContent = no;
  document.getElementById('ocDurum').value = d.durum || '';
  document.getElementById('ocSorumlu').value = d.sorumlu || '';
  document.getElementById('ocSorumluWrap').style.display = (d.durum==='In Progress')?'block':'none';
  document.getElementById('ocStatus').textContent = '';
  const pop = document.getElementById('ocPop');
  const rect = (evt.currentTarget||evt.target).getBoundingClientRect();
  let top = rect.bottom + 6, left = rect.left;
  if(left+240>window.innerWidth) left=window.innerWidth-250;
  if(top+200>window.innerHeight) top=rect.top-210;
  pop.style.top=top+'px'; pop.style.left=left+'px';
  pop.style.display='block';
  document.getElementById('ocPopOverlay').style.display='block';
}
function ocClose(){
  document.getElementById('ocPop').style.display='none';
  document.getElementById('ocPopOverlay').style.display='none';
  ocCurrentNo=null;
}
function ocDurumChange(){
  document.getElementById('ocSorumluWrap').style.display=document.getElementById('ocDurum').value==='In Progress'?'block':'none';
}
function ocSave(){
  const durum=document.getElementById('ocDurum').value;
  const sorumlu=document.getElementById('ocSorumlu').value;
  if(!durum){alert('Please select a status.');return;}
  const now=new Date().toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'});
  OC[ocCurrentNo]={durum,sorumlu,tarih:now};
  try{localStorage.setItem(OC_KEY,JSON.stringify(OC));}catch(e){}
  saveOCToFile(); go();
}
function ocClear(){
  delete OC[ocCurrentNo];
  try{localStorage.setItem(OC_KEY,JSON.stringify(OC));}catch(e){}
  saveOCToFile(); ocClose(); go();
}

/* ── Badge ── */
const OC_COLORS={Declined:'oc-red','Group Interest':'oc-istirak',Observe:'oc-observe','In Progress':'oc-calisiliyor',Won:'oc-kazandik',Lost:'oc-kazanamadik'};
function ocBadge(no){
  const d=OC[no];
  if(!d||!d.durum) return `<span class="oc-bos" onclick="ocOpen('${no}',event)">+ Add</span>`;
  const cls=OC_COLORS[d.durum]||'oc-red';
  let html=`<span class="oc-badge ${cls}" onclick="ocOpen('${no}',event)">${d.durum}</span>`;
  if(d.durum==='In Progress'&&d.sorumlu){
    const parts=d.sorumlu.trim().split(/\s+/);
    const kisa=parts.length>1?parts[0]+' '+parts[parts.length-1][0]+'.':parts[0];
    html+=`<span class="oc-sorumlu">${kisa}</span>`;
  }
  return html;
}

function pill(r){
  if(r.kaldirilan)return'<span class="pill p-amber">Removed</span>';
  const k=r.kalan;
  if(k===null)return'<span class="pill p-gray">?</span>';
  if(k<0)return'<span class="badge">Closed</span>';
  if(k===0)return'<span class="pill p-red">Today!</span>';
  if(k===1)return'<span class="pill p-red">Tomorrow!</span>';
  if(k<=7)return`<span class="pill p-red">${k} gün</span>`;
  if(k<=30)return`<span class="pill p-orange">${k} gün</span>`;
  return`<span class="pill p-green">${k} gün</span>`;
}

function srt(c){sc===c?sd=-sd:(sc=c,sd=1);cp=1;go();}
function go(){
  if(!DATA.length) return;
  const q=document.getElementById('q').value.toLowerCase();
  const fy=document.getElementById('fy').value;
  const fp=document.getElementById('fp').value;
  const fd=document.getElementById('fd').value;
  const foc=document.getElementById('foc').value;
  const fsor=document.getElementById('fsor').value;
  let f=DATA.filter(r=>{
    if(fy){const kp=(r.kapanis||'').split(' ')[0].split('/')[2];const np=(r.no||'').split('/')[1];const y=kp||np||'';if(y!==fy)return false;}
    if(fp&&r.para!==fp)return false;
    if(fd==='acik'){if(r.kaldirilan||r.kalan===null||r.kalan<0)return false;}
    else if(fd==='kapandi'){if(r.kaldirilan||r.kalan===null||r.kalan>=0)return false;}
    else if(fd==='kaldirilan'){if(!r.kaldirilan)return false;}
    if(foc){const d=OC[r.no];const dur=d?.durum||'';if(foc==='_bos'?dur!=='':dur!==foc)return false;}
    if(fsor){const d=OC[r.no];if((d?.sorumlu||'')!==fsor)return false;}
    if(q&&!(r.no+' '+r.kurum+' '+r.kono).toLowerCase().includes(q))return false;
    return true;
  });
  f.sort((a,b)=>{let va=a[sc],vb=b[sc];if(va===null)va=sd===1?Infinity:-Infinity;if(vb===null)vb=sd===1?Infinity:-Infinity;return typeof va==='string'?sd*va.localeCompare(vb,'tr'):sd*(va-vb);});
  document.getElementById('s0').textContent=f.length;
  document.getElementById('s1').textContent=f.filter(r=>!r.kaldirilan&&r.kalan!==null&&r.kalan>7).length;
  document.getElementById('s2').textContent=f.filter(r=>!r.kaldirilan&&r.kalan!==null&&r.kalan>=0&&r.kalan<=7).length;
  document.getElementById('s3').textContent=f.filter(r=>!r.kaldirilan&&r.kalan!==null&&r.kalan>=0&&r.kalan<=1).length;
  document.getElementById('s4').textContent=f.filter(r=>!r.kaldirilan&&r.kalan!==null&&r.kalan<0).length;
  document.getElementById('s5').textContent=f.filter(r=>r.kaldirilan).length;
  document.getElementById('rcnt').textContent=f.length+' ihale';
  const tot=f.length,pages=Math.ceil(tot/PS)||1;
  if(cp>pages)cp=pages;
  const sl=f.slice((cp-1)*PS,cp*PS);
  document.getElementById('tb').innerHTML=sl.map(r=>{
    const rc=r.kaldirilan?'kaldirilan':(r.kalan!==null&&r.kalan<0?'kapandi':r.kalan!==null&&r.kalan<=7?'acil':'');
    const kono=r.kono&&r.kono.length>75?r.kono.slice(0,75)+'…':r.kono||'';
    return`<tr class="${rc}"><td><span class="no">${r.no}</span></td><td><span class="kurum">${r.kurum}</span></td><td><span class="kono" title="${r.kono||''}">${kono}</span></td><td class="bedel">${r.bedel||'—'} <small style="color:#999">${r.para}</small></td><td style="white-space:nowrap">${r.kapanis}</td><td>${pill(r)}</td><td class="oc-cell">${ocBadge(r.no)}</td><td>${r.link?`<a href="${r.link}" target="_blank" class="btn">Detail →</a>`:'—'}</td></tr>`;
  }).join('');
  let btns='';
  if(pages>1){
    btns+=`<button onclick="gp(${cp-1})" ${cp===1?'disabled':''}>&#x2039;</button>`;
    for(let i=1;i<=pages;i++){if(i===1||i===pages||Math.abs(i-cp)<=2)btns+=`<button class="${i===cp?'act':''}" onclick="gp(${i})">${i}</button>`;else if(Math.abs(i-cp)===3)btns+='<span>…</span>';}
    btns+=`<button onclick="gp(${cp+1})" ${cp===pages?'disabled':''}>&#x203a;</button>`;
    btns+=`<span style="font-size:.78rem;color:#666">Page ${cp}/${pages}</span>`;
  }
  document.getElementById('pg').innerHTML=btns;
  document.getElementById('ft').textContent=`MİK — mik.gov.ct.tr | ${tot} tenders | Days remaining calculated live`;
}
function gp(n){cp=n;go();window.scrollTo(0,0);}

/* ── Init from fetched data ── */
function initApp(raw){
  DATA=(raw.ihaleler||[]).map(r=>({
    ...r,
    kalan:kg(r.kapanis),kts:pd(r.kapanis),bn:bn(r.bedel),
    kaldirilan:!!r.kaldirilan,
    link:r.pid?`http://www.mik.gov.ct.tr/maliye/f?p=489:25:0::::P25_ID:${r.pid}`:''
  }));
  OC=Object.assign({},raw.on_calisma||{});
  try{const ls=JSON.parse(localStorage.getItem(OC_KEY)||'{}');Object.assign(OC,ls);}catch(e){}
  const MAP={'Bidding':'Group Interest','Çalışılıyor':'In Progress','çalışılıyor':'In Progress'};
  Object.keys(OC).forEach(no=>{const d=OC[no];if(d&&d.durum&&MAP[d.durum])OC[no]=Object.assign({},d,{durum:MAP[d.durum]});});
  const today=new Date().setHours(0,0,0,0);
  let changed=false;
  DATA.forEach(r=>{
    if(!r.no)return;const d=OC[r.no];
    if(d&&d.durum)return;
    const kts=pd(r.kapanis);if(!kts||kts>=today)return;
    OC[r.no]=Object.assign({},d||{},{durum:'Declined'});changed=true;
  });
  if(changed)try{localStorage.setItem(OC_KEY,JSON.stringify(OC));}catch(e){}
  if(raw.updated)document.getElementById('meta-updated').textContent=raw.updated;
  const fyEl=document.getElementById('fy');
  fyEl.innerHTML='<option value="">📅 All Years</option>';
  const years=[...new Set(DATA.map(r=>{
    const kp=(r.kapanis||'').split(' ')[0].split('/')[2];
    const np=(r.no||'').split('/')[1];return kp||np||'';
  }).filter(Boolean))].sort((a,b)=>b-a);
  const cari=new Date().getFullYear().toString();
  years.forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;if(y===cari)o.selected=true;fyEl.appendChild(o);});
  const loadEl=document.getElementById('loading');
  if(loadEl)loadEl.style.display='none';
  go();
}

async function loadData(){
  let cached=null;
  try{cached=JSON.parse(localStorage.getItem(CACHE_KEY));}catch(e){}
  if(cached&&cached.ihaleler){
    initApp(cached);
  }
  try{
    const resp=await fetch(DATA_URL+'?_='+Date.now());
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const raw=await resp.json();
    try{localStorage.setItem(CACHE_KEY,JSON.stringify(raw));}catch(e){}
    initApp(raw);
  }catch(e){
    if(!cached||!cached.ihaleler){
      const loadEl=document.getElementById('loading');
      if(loadEl)loadEl.textContent='⚠ Veri yüklenemedi: '+e.message+' — lütfen sayfayı yenileyin.';
    }
  }
}
loadData();
</script>
</body>
</html>
